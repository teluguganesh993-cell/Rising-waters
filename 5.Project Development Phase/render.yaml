services:
  - type: web
    name: rising-waters
    env: python
    plan: free
    rootDir: "5.Project Development Phase/Flask"
    buildCommand: pip install -r requirements.txt && python ../Training/train_model.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
